<!DOCTYPE html>
<html xmlns="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>献立アプリ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- 全体のスタイル調整 --- */
        body {
            background-color: #1a1a2e; /* 深みのあるダークブルー */
            color: #e2e8f0;
            font-family: 'M PLUS Rounded 1c', sans-serif; /* 丸みのあるポップなフォント */
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: #ff79c6; /* ポップなネオンピンク */
            font-size: 2.5rem;
            text-shadow: 0 0 10px rgba(255, 121, 198, 0.5);
            margin-bottom: 20px;
        }

        /* --- リンク・ボタンの共通装飾 --- */
        a {
            color: #8be9fd; /* 明るいシアン */
            text-decoration: none;
            transition: all 0.3s ease;
        }
        a:hover {
            color: #50fa7b; /* ホバー時にネオングリーンに変身 */
            text-shadow: 0 0 8px rgba(80, 250, 123, 0.6);
        }

        /* レシピ追加ボタンのカード風装飾 */
        a[href="/input"] {
            display: inline-block;
            background: linear-gradient(135deg, #ff5575, #ffb86c);
            color: #1a1a2e;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 50px; /* ぷっくり丸いフォルム */
            box-shadow: 0 4px 15px rgba(255, 85, 117, 0.4);
            margin-bottom: 30px;
            transform: translateY(0);
        }
        a[href="/input"]:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 85, 117, 0.6);
            color: #1a1a2e;
        }

        /* --- 登録レシピ一覧セクション --- */
        .recipe-list-container {
            width: 100%;
            max-width: 500px;
            background: #262646;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            border: 2px solid #3d3d6b;
        }
        
        .recipe-item {
            background: #1a1a2e;
            margin: 10px 0;
            padding: 2px 15px;
            border-radius: 12px;
            border-left: 5px solid #ff79c6;
            transition: transform 0.2s;
        }
        .recipe-item:hover {
            transform: translateX(5px);
        }
        .recipe-item p {
            margin: 10px 0;
            font-weight: bold;
        }

        /* --- 献立決定フォーム（ボタン） --- */
        form {
            margin-bottom: 30px;
        }
        input[type="submit"] {
            background: #50fa7b; /* 目立つネオングリーン */
            color: #1a1a2e;
            border: none;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 15px 40px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0px #34c759; /* 立体的な押しボタン風 */
            transition: all 0.1s ease;
        }
        input[type="submit"]:hover {
            background: #69ff94;
        }
        input[type="submit"]:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0px #34c759; /* 押された時の沈み込み */
        }

        /* --- 週間献立テーブル --- */
        table {
            width: 100%;
            max-width: 600px;
            border-collapse: separate;
            border-spacing: 0 10px; /* 行間に隙間を作ってポップに */
            margin-top: 10px;
        }

        th {
            color: #bd93f9; /* パステルパープル */
            font-size: 1.1rem;
            padding: 10px;
            text-align: center;
        }

        td {
            background: #262646;
            padding: 15px;
            text-align: center;
            font-weight: bold;
        }

        /* テーブルの角を丸くするための処理 */
        tr td:first-child {
            border-top-left-radius: 15px;
            border-bottom-left-radius: 15px;
            color: #ffb86c; /* 曜日の色をオレンジでアクセント */
            width: 30%;
            border-left: 4px solid #ffb86c;
        }
        tr td:last-child {
            border-top-right-radius: 15px;
            border-bottom-right-radius: 15px;
            text-align: left;
            padding-left: 30px;
        }
        
        /* テーブル内の不要なpマージンをリセット */
        td p {
            margin: 0;
            display: inline-block;
            white-space: nowrap;
        }
        /* --- 編集モーダル --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal {
            background: #1f1f3a;
            padding: 20px;
            border-radius: 12px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            color: #e2e8f0;
        }
        .modal input[type="text"] {
            width: 100%;
            padding: 10px;
            margin: 8px 0 16px 0;
            border-radius: 8px;
            border: 1px solid #3d3d6b;
            background: #262646;
            color: #e2e8f0;
        }
        .modal .buttons {
            text-align: right;
        }
        .modal .buttons button {
            margin-left: 8px;
            padding: 8px 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }
        .btn-cancel { background: #444563; color: #e2e8f0; }
        .btn-save { background: #50fa7b; color: #1a1a2e; }
    </style>
</head>
<body>

    <h1>献立アプリ</h1>
    
    <a href="/input">＋ レシピを追加する</a>
    
    <div class="recipe-list-container">
        <h3 style="margin-top:0; color:#bd93f9; text-align:center;">登録済みのレシピ</h3>
        <div th:each="recipe: ${recipelist}" class="recipe-item">
            <a th:href="${recipe.url}" target="_blank"><p th:text="${recipe.name}"></p></a>
            <a href="#" class="edit-btn" th:attr="data-id=${recipe.id},data-name=${recipe.name},data-url=${recipe.url}"><p>✏️</p></a>
            <a th:href="@{/delete(id=${recipe.id})}" onclick="return confirm('本当に削除しますか？');"><p>🗑</p></a>
        </div>
    </div>

    <form action="#" th:action="@{/home}" method="post">
        <input type="submit" value="🎲 献立を決定する" name="random"/>
    </form>

    <div class="kondate-list">
        <div class="kondate-item" th:each="recipe: ${kondate}">
            <div class="kondate-day" th:text="${recipe.getWday}"></div>
            <div class="kondate-menu">
                <a th:href="${recipe.url}" target="_blank" th:text="${recipe.name}"></a>
            </div>
        </div>
    </div>
</div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h3 style="margin-top:0; color:#bd93f9;">レシピを編集</h3>
            <form th:action="@{/update}" method="post" id="editForm">
                <input type="hidden" name="id" id="edit-id" />
                <label>名前</label>
                <input type="text" name="name" id="edit-name" placeholder="レシピ名" />
                <label>URL</label>
                <input type="text" name="url" id="edit-url" placeholder="https://..." />
                <div class="buttons">
                    <button type="button" class="btn-cancel" id="edit-cancel">キャンセル</button>
                    <button type="submit" class="btn-save">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        (function(){
            const overlay = document.getElementById('editModal');
            const editName = document.getElementById('edit-name');
            const editUrl = document.getElementById('edit-url');
            const editId = document.getElementById('edit-id');
            const cancelBtn = document.getElementById('edit-cancel');

            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', function(e){
                    e.preventDefault();
                    const id = this.getAttribute('data-id');
                    const name = this.getAttribute('data-name');
                    const url = this.getAttribute('data-url');
                    editId.value = id;
                    editName.value = name || '';
                    editUrl.value = url || '';
                    overlay.style.display = 'flex';
                });
            });

            cancelBtn.addEventListener('click', function(){
                overlay.style.display = 'none';
            });

            // Close modal when clicking outside
            overlay.addEventListener('click', function(e){
                if (e.target === overlay) overlay.style.display = 'none';
            });
        })();
    </script>
</body>
</html>
